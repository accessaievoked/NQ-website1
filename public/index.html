<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- SPA Redirect for GitHub Pages -->
    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");

          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      })(window.location);
    </script>

    <!-- Basic Meta -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#074759" />

    <title>Next Quarter | Shopify CRO & Growth Agency</title>

    <meta
      name="description"
      content="Next Quarter is a Shopify CRO & Development Agency helping eCommerce brands increase conversions through Shopify Development, UI/UX Design, A/B Testing, Performance Optimization and Growth Strategy."
    />

    <meta
      name="keywords"
      content="Shopify CRO, Shopify Development, Shopify Experts, Conversion Rate Optimization, Shopify Agency, UI UX Design, eCommerce Growth"
    />

    <meta name="author" content="Next Quarter" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://nxtqtr.com/" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="%PUBLIC_URL%/favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="%PUBLIC_URL%/apple-touch-icon.png"
    />

    <!-- Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Next Quarter" />
    <meta
      property="og:title"
      content="Next Quarter | Shopify CRO & Growth Agency"
    />
    <meta
      property="og:description"
      content="Helping Shopify brands increase revenue through CRO, Shopify Development, Performance Optimization and UI/UX Design."
    />
    <meta property="og:url" content="https://nxtqtr.com/" />

    <!-- IMPORTANT: Replace with your actual public image URL -->
    <meta
      property="og:image"
      content="https://nxtqtr.com/og-image.png"
    />
    <meta
      property="og:image:secure_url"
      content="https://nxtqtr.com/og-image.png"
    />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Next Quarter" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Next Quarter | Shopify CRO & Growth Agency"
    />
    <meta
      name="twitter:description"
      content="Helping Shopify brands increase conversions through CRO, Shopify Development and UX."
    />
    <meta
      name="twitter:image"
      content="https://nxtqtr.com/og-image.png"
    />

    <!-- Mobile -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-title"
      content="Next Quarter"
    />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="default"
    />
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <div id="root"></div>
  </body>
</html>
